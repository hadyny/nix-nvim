name: "Check"
on:
  pull_request:
  push:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/nix-installer-action@v14
    - uses: DeterminateSystems/magic-nix-cache-action@v2
    - uses: DeterminateSystems/flake-checker-action@v5
    - name: Check flake
      run: nix flake check
    - name: Build Neovim
      run: nix build .#packages.x86_64-linux.nvim
    - name: Lint Lua
      run: nix develop .#devShells.x86_64-linux.default --command luacheck nvim/lua
    - name: Headless Smoke Test
      run: nix run .#packages.x86_64-linux.nvim -- --headless +qa
    - name: Check formatting
      run: nix fmt -- --ci
