name: "Update flake inputs"
on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight
  workflow_dispatch:
concurrency:
  group: update-plugins
  cancel-in-progress: true
jobs:
  plugins:
    uses: ./.github/workflows/flake-update.yml
    with:
      # Every input except the two nixpkgs ones (nixpkgs is pinned manually;
      # nixpkgs-neovim is bumped by update.yml). Listed explicitly rather than
      # derived from a grep so the PR contents are predictable.
      update-args: flake-utils gen-luarc devenv csharp-explorer hopcsharp org-bullets org-modern
      branch: update-plugins
      title: "chore: update plugin and tooling inputs"
      body: "Updates the plugin and tooling inputs in `flake.lock` (everything except the pinned nixpkgs inputs)."
    secrets: inherit
