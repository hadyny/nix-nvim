name: "Flake update (reusable)"
# Shared implementation for the flake-input update workflows. Callers pass the
# set of inputs to bump and the PR metadata.
on:
  workflow_call:
    inputs:
      update-args:
        description: "Space-separated inputs for `nix flake update` (empty updates all)"
        type: string
        default: ""
      branch:
        type: string
        required: true
      title:
        type: string
        required: true
      body:
        type: string
        required: true
permissions:
  contents: write
  pull-requests: write
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
    - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
    - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: nix-tools
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
    - name: Update flake inputs
      run: nix flake update ${{ inputs.update-args }}
    # PRs opened with the default GITHUB_TOKEN don't trigger check.yml, so gate
    # the PR on a passing flake check + Neovim build here.
    - name: Validate
      run: |
        nix flake check --impure
        nix build .#nvim
    - uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
      with:
        commit-message: ${{ inputs.title }}
        title: ${{ inputs.title }}
        body: ${{ inputs.body }}
        branch: ${{ inputs.branch }}
        delete-branch: true
